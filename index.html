<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EBQAD | Portfolio 2026</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --midnight: #0B1020; --cyan: #4EF3E8; --white: #E6F1FF; }
        body { background-color: var(--midnight); color: var(--white); font-family: 'IBM Plex Sans Arabic', sans-serif; scroll-behavior: smooth; overflow-x: hidden; margin: 0; }
        .container-custom { max-width: 1100px; margin: 0 auto; width: 92%; }
        
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* تصميم حاد للمشاريع */
        .project-card { 
            background: rgba(255,255,255,0.02); 
            border: 1px solid rgba(78, 243, 232, 0.1); 
            border-radius: 0px; transition: 0.3s; height: 100%; display: flex; flex-direction: column;
        }
        .project-card:hover { border-color: var(--cyan); background: rgba(78, 243, 232, 0.02); }
        
        .img-container { width: 100%; height: 220px; background: #000; overflow: hidden; border-radius: 0px; }
        .img-container img, .img-container video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(20%); }

        .menu-toggle.active span:nth-child(1) { transform: rotate(-45deg) translate(-5px, 6px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(45deg) translate(-5px, -6px); }
        
        .no-italic { font-style: normal !important; }
        .bg-text-shimmer { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 12vw; font-weight: 900; color: rgba(78, 243, 232, 0.02); white-space: nowrap; pointer-events: none; z-index: 0; }
        button, a, input, textarea { border-radius: 0px !important; }
        
        /* تحسينات للسلايدر */
        .swiper { width: 100%; padding-bottom: 50px !important; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-[1000] px-6 py-5 flex justify-between items-center bg-[#0B1020]/95 border-b border-white/5">
        <h1 class="text-xl font-bold tracking-[6px] cursor-pointer" onclick="window.scrollTo(0,0)">EBQAD</h1>
        <button class="menu-toggle flex flex-col gap-1.5 p-2" onclick="toggleMenu()">
            <span class="w-7 h-0.5 bg-cyan-400 transition-all"></span>
            <span class="w-5 h-0.5 bg-cyan-400 transition-all ml-auto"></span>
            <span class="w-7 h-0.5 bg-cyan-400 transition-all"></span>
        </button>
    </header>

    <div id="menuOverlay" class="fixed inset-0 bg-[#0B1020] z-[999] hidden flex-col items-center justify-center gap-10 text-xl font-light tracking-[4px]">
        <a href="#home" onclick="toggleMenu()" class="hover:text-cyan-400 transition">الرئيسية</a>
        <a href="#work" onclick="toggleMenu()" class="hover:text-cyan-400 transition">المشاريع</a>
        <a href="#about" onclick="toggleMenu()" class="hover:text-cyan-400 transition">عني</a>
        <a href="https://drive.google.com/file/d/1YLonT8WxuGARlG1RMnBtf-DXPUHfHjjd/view?usp=drivesdk" target="_blank" class="text-cyan-400 hover:text-white transition uppercase text-lg border-b border-cyan-400/20 pb-1">Download CV</a>
        <button onclick="openContactModal(); toggleMenu();" class="px-10 py-3 border border-white text-white hover:bg-white hover:text-black transition text-sm uppercase tracking-widest">تواصل معي</button>
    </div>

    <section id="home" class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
        <h2 class="text-6xl md:text-9xl font-bold mb-4 tracking-tighter leading-tight">هندسة <br> <span class="text-cyan-400">المستقبل</span></h2>
        <p class="text-slate-500 max-w-2xl text-[10px] uppercase tracking-[5px] mb-8">Data Engineering & Robotics Innovation</p>
        
        <div class="flex justify-center items-center gap-4 md:gap-10 mb-12 border-y border-white/5 py-8 w-full max-w-xl">
            <div class="text-center">
                <div class="text-2xl font-bold text-[#4EF3E8]" id="count-projects">0</div>
                <div class="text-[8px] uppercase tracking-widest opacity-40">Projects</div>
            </div>
            <div class="text-center border-x border-white/10 px-8">
                <div class="text-sm font-bold text-white uppercase tracking-tighter">PostgreSQL</div>
                <div class="text-[8px] uppercase tracking-widest opacity-40">Infrastructure</div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-bold text-white">2026</div>
                <div class="text-[8px] uppercase tracking-widest opacity-40">Edition</div>
            </div>
        </div>
        <div class="flex flex-col gap-4 w-full max-w-[300px]">
            <a href="#work" class="w-full py-4 border border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black transition font-bold text-xs uppercase tracking-[3px]">استعراض الأعمال</a>
            <button onclick="openContactModal()" class="w-full py-4 bg-white text-black font-bold text-xs uppercase tracking-[3px]">ابدأ مشروعك الآن</button>
        </div>
    </section>

    <section id="work" class="py-24 border-t border-white/5">
        <div class="container-custom">
            <h3 class="text-cyan-400 text-xs font-bold uppercase tracking-[10px] mb-16 text-right border-r-4 border-cyan-400 pr-4">Selected Work</h3>
            <div class="swiper projectSwiper">
                <div class="swiper-wrapper" id="sheet-projects">
                    </div>
            </div>
        </div>
    </section>

    <section id="about" class="relative py-32 overflow-hidden border-t border-white/5 bg-black/20">
        <div class="bg-text-shimmer uppercase">EBQAD BIO</div>
        <div class="container-custom relative z-10">
            <div class="reveal max-w-4xl">
                <h3 class="text-cyan-400 text-xs font-bold uppercase tracking-[10px] mb-10">Briefing</h3>
                <p id="aboutText" class="text-white text-2xl md:text-5xl font-light leading-snug no-italic mb-12 text-right">جاري تحميل النبذة الشخصية...</p>
                <div class="h-px bg-cyan-400/20 w-32 mb-12"></div>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-white/5 bg-black">
        <div class="flex justify-center gap-12 mb-10 text-2xl text-slate-500">
            <a href="https://www.facebook.com/share/1FnQ746HHL/" target="_blank" class="hover:text-cyan-400 transition"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="mailto:bariqaday@gmail.com" class="hover:text-cyan-400 transition"><i class="fa-regular fa-envelope"></i></a>
            <a href="#" class="hover:text-cyan-400 transition"><i class="fa-brands fa-github"></i></a>
        </div>
        <p class="text-slate-700 text-[10px] tracking-[6px] uppercase font-bold">
            EBQAD © <span id="current-year"></span> | BUILT FOR THE FUTURE
        </p>
    </footer>

    <div id="fullProjectView" class="fixed inset-0 z-[3000] hidden bg-[#0B1020] overflow-y-auto p-6 md:p-12 text-right">
        <div class="container-custom pb-20">
            <button onclick="closeProjectPage()" class="mb-12 text-slate-400 hover:text-cyan-400 flex items-center gap-4 transition text-sm font-bold uppercase tracking-[4px]">
                <i class="fas fa-arrow-right"></i> Back to gallery
            </button>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-16 items-start">
                <div class="border border-white/10 p-1 bg-black"><div id="fullViewMedia" class="w-full"></div></div>
                <div>
                    <h1 id="fullViewTitle" class="text-5xl md:text-7xl font-bold text-white mb-8"></h1>
                    <span id="fullViewTech" class="inline-block mb-10 text-cyan-400 text-[10px] font-bold tracking-[4px] border border-cyan-400/30 px-4 py-2 uppercase"></span>
                    <p id="fullViewDesc" class="text-slate-300 leading-relaxed text-xl mb-12 no-italic"></p>
                    <button onclick="openContactModal()" class="px-12 py-5 bg-white text-black font-bold text-[11px] uppercase tracking-widest hover:bg-cyan-400 transition">Request System Build</button>
                </div>
            </div>
        </div>
    </div>

    <div id="contactModal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-6 bg-black/98 backdrop-blur-xl">
        <div class="bg-[#0B1020] border border-white/10 max-w-md w-full p-10 text-right">
            <h2 class="text-xl font-bold text-white mb-8 uppercase tracking-widest border-r-4 border-cyan-400 pr-4">Contact</h2>
            <div class="flex flex-col gap-6">
                <input id="msgName" type="text" placeholder="FULL NAME" class="bg-transparent p-4 border border-white/10 text-white outline-none focus:border-cyan-400 text-xs tracking-widest uppercase">
                <textarea id="msgBody" placeholder="PROJECT DETAILS" class="bg-transparent p-4 border border-white/10 text-white h-40 outline-none focus:border-cyan-400 text-xs tracking-widest uppercase"></textarea>
                <button id="sendBtn" onclick="sendMessage()" class="bg-cyan-400 text-black font-bold py-5 uppercase text-[11px] tracking-widest hover:bg-white transition">Submit Inquiry</button>
                <button onclick="closeContactModal()" class="text-slate-600 text-[9px] mt-4 uppercase tracking-[4px] text-center">Close Window</button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://web-production-146d2.up.railway.app/api";

        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                if (elementTop < windowHeight - 100) { reveals[i].classList.add("active"); }
            }
        }
        window.addEventListener("scroll", reveal);

        async function loadData() {
            try {
                const [prRes, abRes] = await Promise.all([fetch(`${API}/projects`), fetch(`${API}/about`)]);
                const projects = await prRes.json();
                const about = await abRes.json();
                
                document.getElementById('count-projects').innerText = projects.length;
                document.getElementById('aboutText').innerText = about.content;
                document.getElementById('current-year').innerText = new Date().getFullYear();

                document.getElementById('sheet-projects').innerHTML = projects.map(p => `
                    <div class="swiper-slide project-card group cursor-pointer" onclick='goToProjectPage(${JSON.stringify(p).replace(/'/g, "&apos;")})'>
                        <div class="img-container">
                            ${p.image_url && p.image_url.includes('mp4') ? `<video src="${p.image_url}" autoplay muted loop></video>` : `<img src="${p.image_url}" alt="${p.title}">`}
                        </div>
                        <div class="p-8 text-right flex flex-col flex-1">
                            <h4 class="text-white text-2xl font-bold mb-4 group-hover:text-cyan-400 transition tracking-tight">${p.title}</h4>
                            <p class="text-slate-500 text-xs mb-8 line-clamp-2 leading-relaxed uppercase tracking-wider">${p.description}</p>
                            <div class="mt-auto text-[10px] text-cyan-400 font-bold uppercase tracking-[3px] flex items-center gap-4">
                                <span>Exploration</span> <div class="h-px bg-cyan-400/30 flex-1"></div>
                            </div>
                        </div>
                    </div>
                `).join('');

                initSwiper();
            } catch (e) { console.error("Connection Failed"); }
        }

        function initSwiper() {
            new Swiper(".projectSwiper", {
                slidesPerView: 1,
                spaceBetween: 30,
                loop: true,
                speed: 1200,
                autoplay: { delay: 3000, disableOnInteraction: false },
                breakpoints: { 768: { slidesPerView: 2 }, 1024: { slidesPerView: 3 } }
            });
        }

        function goToProjectPage(p) {
            const media = document.getElementById('fullViewMedia');
            media.innerHTML = p.image_url.includes('mp4') ? `<video src="${p.image_url}" controls autoplay class="w-full"></video>` : `<img src="${p.image_url}" class="w-full">`;
            document.getElementById('fullViewTitle').innerText = p.title;
            document.getElementById('fullViewDesc').innerText = p.description;
            document.getElementById('fullViewTech').innerText = p.tech_stack || "DATA ENGINE / SQL / PYTHON";
            document.getElementById('fullProjectView').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeProjectPage() { document.getElementById('fullProjectView').classList.add('hidden'); document.body.style.overflow = 'auto'; }
        function toggleMenu() { 
            const overlay = document.getElementById('menuOverlay');
            document.querySelector('.menu-toggle').classList.toggle('active');
            overlay.classList.toggle('hidden'); overlay.classList.toggle('flex'); 
        }
        function openContactModal() { document.getElementById('contactModal').classList.replace('hidden', 'flex'); }
        function closeContactModal() { document.getElementById('contactModal').classList.replace('flex', 'hidden'); }

        async function sendMessage() {
            const btn = document.getElementById('sendBtn');
            const data = { name: document.getElementById('msgName').value, message: document.getElementById('msgBody').value };
            if(!data.name || !data.message) return alert("REQUIRED FIELDS MISSING");
            btn.innerText = "SENDING...";
            try {
                const res = await fetch(`${API}/messages`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                if(res.ok) { alert("INQUIRY RECEIVED"); closeContactModal(); }
            } catch (e) { alert("ERROR"); }
            finally { btn.innerText = "SUBMIT INQUIRY"; }
        }

        window.onload = loadData;
    </script>
</body>
    </html>
