<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBQAD | Portfolio 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --midnight: #0B1020; --cyan: #4EF3E8; --white: #E6F1FF; }
        body { background-color: var(--midnight); color: var(--white); font-family: 'IBM Plex Sans Arabic', sans-serif; scroll-behavior: smooth; overflow-x: hidden; }
        
        /* اللمعة للعنوان */
        .logo-text::after { 
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; 
            background: linear-gradient(90deg, transparent, rgba(78, 243, 232, 0.4), transparent); 
            animation: shineOnce 2.5s ease-out forwards; 
        }
        @keyframes shineOnce { 0% { left: -100%; } 100% { left: 100%; } }

        /* حركة الهمبرغر */
        .menu-toggle.active span:nth-child(1) { transform: rotate(-45deg) translate(-5px, 6px); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: rotate(45deg) translate(-5px, -6px); }

        /* السلايدر الانسيابي */
        #sheet-projects { 
            display: flex; gap: 2rem; padding: 2rem;
            overflow-x: auto; scroll-behavior: smooth;
        }
        #sheet-projects::-webkit-scrollbar { display: none; }

        /* البطاقات المربعة */
        .project-card { 
            width: 300px; height: 300px; flex-shrink: 0; position: relative; 
            overflow: hidden; border: 1px solid rgba(78, 243, 232, 0.1); border-radius: 4px;
            transition: all 0.7s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer;
        }
        .project-card:hover { 
            border-color: var(--cyan); transform: scale(1.05) translateY(-10px); 
            box-shadow: 0 0 30px rgba(78, 243, 232, 0.15);
        }
        .project-card img, .project-card video { width: 100%; height: 100%; object-fit: cover; filter: grayscale(50%); transition: 0.8s; }
        .project-card:hover img, .project-card:hover video { filter: grayscale(0%); }

        /* الفواصل النازكة */
        .about-separator {
            height: 1px; background: linear-gradient(90deg, transparent, rgba(78, 243, 232, 0.2), transparent);
            width: 60%; margin: 2rem auto;
        }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-[1000] px-8 py-6 flex justify-between items-center bg-[#0B1020]/80 backdrop-blur-md">
        <h1 class="logo-text relative text-xl font-bold tracking-[8px] overflow-hidden px-2 cursor-pointer" onclick="window.scrollTo(0,0)">EBQAD</h1>
        
        <button class="menu-toggle flex flex-col gap-1.5 p-2 transition-all" onclick="toggleMenu()">
            <span class="w-7 h-0.5 bg-cyan-400 transition-all"></span>
            <span class="w-5 h-0.5 bg-cyan-400 transition-all ml-auto"></span>
            <span class="w-7 h-0.5 bg-cyan-400 transition-all"></span>
        </button>
    </header>

    <div id="menuOverlay" class="fixed inset-0 bg-[#0B1020] z-[999] hidden flex-col items-center justify-center gap-10 text-2xl font-light tracking-[4px]">
        <a href="#home" onclick="toggleMenu()" class="hover:text-cyan-400 transition">الرئيسية</a>
        <a href="#work" onclick="toggleMenu()" class="hover:text-cyan-400 transition">أعمالي</a>
        <a href="#about" onclick="toggleMenu()" class="hover:text-cyan-400 transition">عني</a>
        <button onclick="openContactModal(); toggleMenu();" class="px-10 py-3 border border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black transition text-sm">تواصل معي</button>
    </div>

    <section id="home" class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-24">
        <h2 class="text-6xl md:text-9xl font-bold mb-8 tracking-tighter">هندسة <br> <span class="text-cyan-400">المستقبل</span></h2>
        <p class="text-slate-500 max-w-2xl text-[10px] md:text-xs mb-12 uppercase tracking-[6px]">Data Engineering & Robotics Innovation</p>
        <div class="flex flex-col md:flex-row gap-6">
            <a href="#work" class="px-16 py-4 border border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black transition font-bold">المشاريع</a>
            <button onclick="openContactModal()" class="px-16 py-4 bg-white text-black font-bold">تواصل معي</button>
        </div>
    </section>

    <section id="work" class="py-24 bg-white/[0.01] border-y border-white/5">
        <h3 class="text-center text-cyan-400/50 mb-16 tracking-[10px] text-[10px] font-bold uppercase">Work Gallery</h3>
        <div id="sheet-projects"></div>
    </section>

    <section id="about" class="max-w-3xl mx-auto py-24 px-6 text-center">
        <div class="about-separator"></div>
        <h2 class="text-2xl font-bold mb-8 tracking-[5px] text-white">عن EBQAD</h2>
        <p id="aboutText" class="text-slate-400 leading-loose text-lg font-light italic">جاري تحميل النبذة الشخصية...</p>
        <div class="about-separator"></div>
    </section>

    <footer class="py-16 text-center border-t border-white/5 bg-black/20">
        <div class="flex justify-center gap-10 mb-8 text-2xl text-slate-500">
            <a href="https://www.facebook.com/share/1FnQ746HHL/" target="_blank" class="hover:text-cyan-400 transition"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="mailto:bariqaday@gmail.com" class="hover:text-cyan-400 transition"><i class="fa-regular fa-envelope"></i></a>
        </div>
        <p class="text-slate-700 text-[8px] tracking-[4px]">EBQAD © 2026 | ALL RIGHTS RESERVED</p>
    </footer>

    <div id="projectModal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <div class="bg-[#0D1117] border border-cyan-400/20 max-w-2xl w-full rounded-sm overflow-hidden relative shadow-2xl">
            <button onclick="closeProjectModal()" class="absolute top-4 left-4 text-white/30 hover:text-cyan-400 text-3xl z-10">&times;</button>
            <div id="modalContent" class="p-8 text-right"></div>
        </div>
    </div>

    <div id="contactModal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-md">
        <div class="bg-[#0D1117] border border-cyan-400/20 max-w-md w-full p-10 rounded-sm shadow-2xl">
            <h2 class="text-xl font-bold text-cyan-400 mb-8 text-center uppercase tracking-widest">ارسل رسالة</h2>
            <div class="flex flex-col gap-5 text-right">
                <input id="msgName" type="text" placeholder="الاسم" class="bg-white/5 p-4 border border-white/10 outline-none focus:border-cyan-400 transition">
                <input id="msgEmail" type="email" placeholder="الايميل" class="bg-white/5 p-4 border border-white/10 outline-none focus:border-cyan-400 transition">
                <textarea id="msgBody" placeholder="كيف اساعدك؟" class="bg-white/5 p-4 border border-white/10 h-32 outline-none focus:border-cyan-400 transition"></textarea>
                <button id="sendBtn" onclick="sendMessage()" class="bg-cyan-400 text-black font-bold py-4 hover:bg-white transition uppercase text-xs tracking-widest">ارسال الان</button>
                <button onclick="closeContactModal()" class="text-slate-600 text-[10px] mt-2 uppercase">اغلاق</button>
            </div>
        </div>
    </div>

    <script>
        const API = 'https://control-panel-production-6733.up.railway.app/api';

        async function loadData() {
            try {
                const [prRes, abRes] = await Promise.all([ fetch(`${API}/projects`), fetch(`${API}/about`) ]);
                const projects = await prRes.json();
                const about = await abRes.json();

                document.getElementById('sheet-projects').innerHTML = projects.map(p => `
                    <div class="project-card" onclick="openProjectDetails('${p.title}', '${p.image_url}', '${p.description}')">
                        ${p.image_url.includes('mp4') ? `<video src="${p.image_url}" autoplay muted loop></video>` : `<img src="${p.image_url}">`}
                        <div class="absolute inset-0 bg-black/40 hover:bg-transparent transition-all flex items-end p-6">
                            <h4 class="text-white font-bold tracking-widest text-sm">${p.title}</h4>
                        </div>
                    </div>
                `).join('');
                document.getElementById('aboutText').innerText = about.content;
            } catch (e) { console.log("خطأ في الاتصال"); }
        }

        function toggleMenu() {
            const btn = document.querySelector('.menu-toggle');
            const overlay = document.getElementById('menuOverlay');
            btn.classList.toggle('active');
            overlay.classList.toggle('hidden');
            overlay.classList.toggle('flex');
            document.body.style.overflow = overlay.classList.contains('hidden') ? 'auto' : 'hidden';
        }

        function openProjectDetails(title, img, desc) {
            const content = document.getElementById('modalContent');
            content.innerHTML = `
                ${img.includes('mp4') ? `<video src="${img}" class="w-full h-64 object-cover mb-6" controls autoplay muted loop></video>` : `<img src="${img}" class="w-full h-64 object-cover mb-6 border border-white/5">`}
                <h2 class="text-2xl font-bold text-cyan-400 mb-4">${title}</h2>
                <p class="text-slate-400 leading-relaxed text-base mb-8">${desc}</p>
                <button onclick="closeProjectModal()" class="w-full py-4 bg-cyan-400 text-black font-bold hover:bg-white transition uppercase text-xs tracking-widest">عودة</button>
            `;
            document.getElementById('projectModal').classList.replace('hidden', 'flex');
            document.body.style.overflow = 'hidden';
        }

        function closeProjectModal() { document.getElementById('projectModal').classList.replace('flex', 'hidden'); document.body.style.overflow = 'auto'; }
        function openContactModal() { document.getElementById('contactModal').classList.replace('hidden', 'flex'); }
        function closeContactModal() { document.getElementById('contactModal').classList.replace('flex', 'hidden'); }

        async function sendMessage() {
            const btn = document.getElementById('sendBtn');
            const data = { name: document.getElementById('msgName').value, email: document.getElementById('msgEmail').value, message: document.getElementById('msgBody').value };
            if(!data.name || !data.message) return alert("يرجى اكمال البيانات");
            btn.innerText = "جاري الارسال...";
            try {
                const res = await fetch(`${API}/messages`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                if(res.ok) { alert("✅ وصلت رسالتك"); closeContactModal(); }
            } catch (e) { alert("مشكلة في الارسال"); }
            finally { btn.innerText = "ارسال الان"; }
        }

        window.onload = loadData;
    </script>
</body>
</html>
