<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
    <title>EBQAD | Portfolio 2026</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--midnight:#0B1020;--cyan:#4EF3E8;--white:#E6F1FF}
        body{background-color:var(--midnight);color:var(--white);font-family:'IBM Plex Sans Arabic',sans-serif;scroll-behavior:smooth;overflow-x:hidden;margin:0}
        .container-custom{max-width:1100px;margin:0 auto;width:92%}
        .reveal{opacity:0;transform:translateY(20px);transition:all .8s ease-out}
        .reveal.active{opacity:1;transform:translateY(0)}
        
        /* تحسين حركة النبذة عني */
        #aboutContent {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #aboutContent.open {
            max-height: 1200px; /* القيمة التي تسمح بظهور النص كاملاً */
        }
        .arrow-icon { transition: transform 0.4s ease; }
        .arrow-icon.rotate { transform: rotate(180deg); }

        .project-card{background:rgba(255,255,255,.02);border:1px solid rgba(78,243,232,.1);border-radius:0;transition:.3s;height:100%;display:flex;flex-direction:column}
        .project-card:hover{border-color:var(--cyan);background:rgba(78,243,232,.02)}
        .img-container{width:100%;height:220px;background:#000;overflow:hidden;border-radius:0}
        .img-container img,.img-container video{width:100%;height:100%;object-fit:cover;filter:grayscale(20%)}

        .menu-toggle.active span:nth-child(1){transform:rotate(-45deg) translate(-5px,6px)}
        .menu-toggle.active span:nth-child(2){opacity:0}
        .menu-toggle.active span:nth-child(3){transform:rotate(45deg) translate(-5px,-6px)}

        /* تأثير اللمعة */
        .logo-shine { position: relative; overflow: hidden; display: inline-block; }
        .logo-shine::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 80%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(78, 243, 232, 0.7), transparent);
            transform: skewX(-25deg);
        }
        .shine-active::after { animation: shine-logic 4s ease-in-out forwards; }
        @keyframes shine-logic { 0% { left: -150%; } 100% { left: 250%; } }

        button,a,input,textarea{border-radius:0!important}
        .no-italic{font-style:normal!important}
    </style>
</head>
<body>
    <header class="fixed top-0 w-full z-[1000] px-6 py-5 flex justify-between items-center bg-[#0B1020]/95 border-b border-white/5">
        <h1 id="mainLogo" class="text-xl font-bold tracking-[6px] cursor-pointer logo-shine" onclick="window.scrollTo(0,0)">EBQAD</h1>
        <button class="menu-toggle flex flex-col gap-1.5 p-2" onclick="toggleMenu()">
            <span class="w-7 h-0.5 bg-cyan-400 transition-all"></span>
            <span class="w-5 h-0.5 bg-cyan-400 transition-all ml-auto"></span>
            <span class="w-7 h-0.5 bg-cyan-400 transition-all"></span>
        </button>
    </header>

    <div id="menuOverlay" class="fixed inset-0 bg-[#0B1020] z-[999] hidden flex-col items-center justify-center gap-10 text-xl font-light tracking-[4px]">
        <a href="#home" onclick="toggleMenu()" class="hover:text-cyan-400 transition">الرئيسية</a>
        <a href="#work" onclick="toggleMenu()" class="hover:text-cyan-400 transition">المشاريع</a>
        <a href="#about" onclick="toggleMenu()" class="hover:text-cyan-400 transition">عني</a>
        <button onclick="openContactModal();toggleMenu()" class="px-10 py-3 border border-white text-white hover:bg-white hover:text-black transition text-sm uppercase tracking-widest">تواصل معي</button>
    </div>

    <section id="home" class="min-h-screen flex flex-col items-center justify-center text-center px-6 pt-20">
        <h2 class="text-6xl md:text-9xl font-bold mb-4 tracking-tighter leading-tight">هندسة <br><span class="text-cyan-400">المستقبل</span></h2>
        <p class="text-slate-500 max-w-2xl text-[10px] uppercase tracking-[5px] mb-8">Data Engineering & Robotics Innovation</p>
        <div class="flex justify-center items-center gap-4 md:gap-10 mb-12 border-y border-white/5 py-8 w-full max-w-xl">
            <div class="text-center">
                <div class="text-2xl font-bold text-[#4EF3E8]" id="count-projects">0</div>
                <div class="text-[8px] uppercase tracking-widest opacity-40">Projects</div>
            </div>
            <div class="text-center border-x border-white/10 px-8">
                <div class="text-sm font-bold text-white uppercase tracking-tighter">PostgreSQL</div>
                <div class="text-[8px] uppercase tracking-widest opacity-40">Infrastructure</div>
            </div>
            <div class="text-center">
                <div class="text-2xl font-bold text-white">2026</div>
                <div class="text-[8px] uppercase tracking-widest opacity-40">Edition</div>
            </div>
        </div>
        <div class="flex flex-col gap-4 w-full max-w-[300px]">
            <a href="#work" class="w-full py-4 border border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black transition font-bold text-xs uppercase tracking-[3px]">استعراض الأعمال</a>
            <button onclick="openContactModal()" class="w-full py-4 bg-white text-black font-bold text-xs uppercase tracking-[3px]">ابدأ مشروعك الآن</button>
        </div>
    </section>

    <section id="work" class="py-24 border-t border-white/5">
        <div class="container-custom">
            <h3 class="text-cyan-400 text-xs font-bold uppercase tracking-[10px] mb-16 text-right border-r-4 border-cyan-400 pr-4">Selected Work</h3>
            <div class="swiper projectSwiper">
                <div class="swiper-wrapper" id="sheet-projects"></div>
            </div>
        </div>
    </section>

    <section id="about" class="py-32 border-t border-white/5 bg-black/10">
        <div class="container-custom">
            <div class="reveal max-w-4xl active">
                <div onclick="toggleAbout()" class="flex items-center justify-between cursor-pointer group border-b border-white/5 pb-8">
                    <h3 class="text-cyan-400 text-xs font-bold uppercase tracking-[10px] group-hover:text-white transition">Briefing / عني</h3>
                    <div class="arrow-icon text-cyan-400 text-xl group-hover:scale-125 transition"><i class="fas fa-chevron-down"></i></div>
                </div>
                <div id="aboutContent" class="mt-12">
                    <p id="aboutText" class="text-white text-2xl md:text-5xl font-light leading-snug no-italic text-right">جاري التحميل...</p>
                    <div class="h-px bg-cyan-400/20 w-32 mt-12 mb-12"></div>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-20 text-center border-t border-white/5 bg-black">
        <div class="flex justify-center gap-12 mb-10 text-2xl text-slate-500">
            <a href="https://www.facebook.com/share/17L2s1mhG2/" target="_blank" class="hover:text-cyan-400 transition"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="mailto:bariqaday@gmail.com" class="hover:text-cyan-400 transition"><i class="fa-regular fa-envelope"></i></a>
        </div>
        <p class="text-slate-700 text-[10px] tracking-[6px] uppercase font-bold">EBQAD © <span id="current-year"></span> | BUILT FOR THE FUTURE</p>
    </footer>

    <div id="contactModal" class="fixed inset-0 z-[2000] hidden items-center justify-center p-6 bg-black/98 backdrop-blur-xl">
        <div class="bg-[#0B1020] border border-white/10 max-w-md w-full p-10 text-right">
            <h2 class="text-xl font-bold text-white mb-8 uppercase tracking-widest border-r-4 border-cyan-400 pr-4">Contact</h2>
            <div class="flex flex-col gap-6">
                <input id="msgName" type="text" placeholder="FULL NAME" class="bg-transparent p-4 border border-white/10 text-white outline-none focus:border-cyan-400 text-xs tracking-widest uppercase">
                <textarea id="msgBody" placeholder="PROJECT DETAILS" class="bg-transparent p-4 border border-white/10 text-white h-40 outline-none focus:border-cyan-400 text-xs tracking-widest uppercase"></textarea>
                <button id="sendBtn" onclick="sendMessage()" class="bg-cyan-400 text-black font-bold py-5 uppercase text-[11px] tracking-widest hover:bg-white transition">Submit Inquiry</button>
                <button onclick="closeContactModal()" class="text-slate-600 text-[9px] mt-4 uppercase tracking-[4px] text-center">Close Window</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://dxcjzryotzfaqbseqtts.supabase.co";
        const SB_KEY = "EyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR4Y2p6cnlvdHpmYXFic2VxdHRzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMDE1MzYsImV4cCI6MjA4ODY3NzUzNn0.GjDj1AarSakbXX7D00cVh_EjSPQAFgwvkD4QprNsGko";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const logo = document.getElementById('mainLogo');

        // اللمعة
        function triggerShine() {
            logo.classList.add('shine-active');
            setTimeout(() => { logo.classList.remove('shine-active'); }, 4000);
        }

        // 1. تفعيل اللمعة فور الدخول
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(triggerShine, 600);
        });

        // 2. تفعيل اللمعة عند اللمس
        logo.addEventListener('mouseenter', triggerShine);

        // الهمبرغر
        function toggleMenu(){
            const e=document.getElementById("menuOverlay");
            document.querySelector(".menu-toggle").classList.toggle("active");
            e.classList.toggle("hidden"); e.classList.toggle("flex");
        }

        // النبذة (تم إصلاحها هنا)
        function toggleAbout(){
            const content = document.getElementById("aboutContent");
            const icon = document.querySelector(".arrow-icon");
            content.classList.toggle("open");
            icon.classList.toggle("rotate");
        }

        function openContactModal(){document.getElementById("contactModal").classList.replace("hidden","flex")}
        function closeContactModal(){document.getElementById("contactModal").classList.replace("flex","hidden")}

        async function sendMessage(){
            const e=document.getElementById("sendBtn"), t=document.getElementById("msgName").value, n=document.getElementById("msgBody").value;
            if(!t||!n) return alert("FIELDS REQUIRED");
            e.innerText="SENDING...";
            const{error:a}=await _supabase.from("messages").insert([{name:t,message:n}]);
            a?alert("TRY AGAIN"):(alert("RECEIVED!"),closeContactModal());
            e.innerText="SUBMIT INQUIRY"
        }

        async function loadData(){
            try{
                // السطر المختصر الذي طلبته
                let { data, error } = await _supabase.from("projects").select("*");
                if(data){
                    document.getElementById("count-projects").innerText=data.length;
                    document.getElementById("sheet-projects").innerHTML=data.map((e=>`
                        <div class="swiper-slide project-card group cursor-pointer">
                            <div class="img-container">
                                ${e.image_url&&e.image_url.includes("mp4")?`<video src="${e.image_url}" autoplay muted loop></video>`:`<img src="${e.image_url}" alt="${e.title}">`}
                            </div>
                            <div class="p-8 text-right flex flex-col flex-1">
                                <h4 class="text-white text-2xl font-bold mb-4 group-hover:text-cyan-400 transition tracking-tight">${e.title}</h4>
                                <p class="text-slate-500 text-xs mb-8 line-clamp-2 leading-relaxed uppercase tracking-wider">${e.description}</p>
                            </div>
                        </div>`)).join("");
                    initSwiper();
                }
                
                // جلب بيانات النبذة
                let { data: profileData } = await _supabase.from("profile").select("content").single();
                if(profileData) document.getElementById("aboutText").innerText = profileData.content;

                document.getElementById("current-year").innerText=(new Date).getFullYear();
            }catch(e){console.error(e)}
        }

        function initSwiper(){
            new Swiper(".projectSwiper",{slidesPerView:1,spaceBetween:30,loop:!0,speed:1200,autoplay:{delay:3e3},breakpoints:{768:{slidesPerView:2},1024:{slidesPerView:3}}});
        }

        window.onload=loadData;

        // تأثير الظهور التدريجي عند السكرول
        window.onscroll=function(){
            document.querySelectorAll(".reveal").forEach((e=>{
                if(e.getBoundingClientRect().top < window.innerHeight - 50) e.classList.add("active");
            }));
        };
    </script>
</body>
</html>
